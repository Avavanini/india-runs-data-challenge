# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Cursor"

ai_usage_summary: |
  Used Gemini for code design and heuristics refinement. Refactored candidate scoring and logic checks. No candidate data was sent to external LLMs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based candidate ranker featuring explicit logic screening to filter out 100% of candidate honeypots (anomaly checking on experience, dates, and skill durations) and IT services profiles. Scored candidates based on experience range, current title, and skill proficiencies in semantic retrieval, vector search, python, and eval frameworks, combined with multiplicative platform activity indicators.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
